version: "3.8"

services:
  app:
    build: .
    container_name: nexora_app
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    environment:
      - PG_HOST=postgres
      - PG_USER=postgres
      - PG_PASSWORD=Pik@Pik@1717
      - PG_DATABASE=nexora
      - PG_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Pik@Pik@1717
      POSTGRES_DB: nexora
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d

  redis:
    image: redis:latest
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
