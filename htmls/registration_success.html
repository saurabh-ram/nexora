<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <link rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 2rem;
        }
        p {
            font-size: 1.2rem;
        }
        .btn {
            background: transparent;
            color: #ffffff;
            margin: 0 -10px;
            padding: 6px 22px;
            border: 2px #ffffff solid;
            border-radius: 30px;
            font-weight: 900;
            cursor: pointer;
            box-sizing: border-box;
            text-decoration: none;
        }
        .btn:hover {
            background: #4CAF50;
            border-color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <circle cx="60" cy="60" r="55" fill="none" stroke="#4CAF50" stroke-width="6" stroke-dasharray="360" stroke-linecap="round"/>
                <path d="M35 60 L52 78 L85 40" fill="none" stroke="#4CAF50" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1>Registration Successful!</h1>
        <p>Check your email for verification and complete your registration.</p>
        <a href="/" class="btn">Go to Home</a>
    </div>
</body>
</html>
